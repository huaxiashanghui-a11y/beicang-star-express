<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e3a5f 0%, #0f1f3d 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
    .container { text-align: center; padding: 40px; }
    h1 { font-size: 48px; margin-bottom: 20px; }
    p { font-size: 18px; color: #94a3b8; margin-bottom: 30px; }
    .status { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; margin-bottom: 20px; }
    .success { color: #4ade80; }
    .error { color: #f87171; }
    .btn { display: inline-block; padding: 12px 30px; background: linear-gradient(135deg, #f97316, #3b82f6); color: white; text-decoration: none; border-radius: 8px; font-weight: bold; margin: 10px; }
    .btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <h1>管理后台</h1>
    <p>北苍星际速充 - 管理后台测试页面</p>

    <div class="status" id="status">
      <p>正在检测...</p>
    </div>

    <div>
      <a href="/admin/login" class="btn">访问登录页</a>
      <a href="/" class="btn">返回首页</a>
    </div>

    <script>
      const status = document.getElementById('status');
      let html = '<p class="success">✓ 测试页面加载成功</p>';

      // 检测JS
      if (typeof window !== 'undefined') {
        html += '<p class="success">✓ JavaScript 已启用</p>';
      }

      // 检测CSS
      const testEl = document.createElement('div');
      testEl.style.cssText = 'display:none';
      document.body.appendChild(testEl);
      html += '<p class="success">✓ CSS 已加载</p>';

      status.innerHTML = html;
    </script>
  </div>
</body>
</html>
